<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Framewise</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            background: #0a0a0a;
            color: #ededed;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 2rem;
        }
        main { text-align: center; max-width: 32rem; }
        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 700;
            letter-spacing: -0.04em;
            margin-bottom: 1rem;
        }
        p { color: #a1a1aa; font-size: 1.125rem; line-height: 1.6; }
        .dot {
            display: inline-block;
            width: 0.5rem;
            height: 0.5rem;
            background: #22c55e;
            border-radius: 50%;
            margin-right: 0.5rem;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        small { display: block; margin-top: 2rem; color: #525252; font-size: 0.875rem; }
    </style>
</head>
<body>
    <main>
        <h1>Framewise</h1>
        <p><span class="dot"></span>Website in opbouw</p>
        <small>Deployed via Vercel · Source on GitHub</small>
    </main>
</body>
</html>
